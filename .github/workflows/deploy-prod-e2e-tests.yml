name: Build and deploy prod-e2e-tests
on:
  push:
    branches:
      - main
      - fix-workflows
    paths-ignore:
      - '*.md'
      - 'tests/dev-e2e.spec.js'
      - 'tests/prod-checklinks.spec.js'
      - '.github/workflows/deploy-dev-e2e-tests.yml'
      - '.github/workflows/prod-checklinks.yml'

jobs:
  build_and_deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build and push
        uses: nais/docker-build-push@87f920b0411b987d9a1fd4113aa384e1e3b54f2c #v0
        id: docker-build-push
        with:
          team: arbeidsplassen
      - name: Deploy to Nais
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 #v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/prod-e2e-tests.yaml
          VAR: image=${{ steps.docker-build-push.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-push.outputs.telemetry }}
