name: Check broken links in prod
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'tests/dev-e2e.spec.js'
      - 'tests/prod-uptest.spec.js'
      - '.github/workflows/deploy-dev-e2e-tests.yml'
      - '.github/workflows/deploy-prod-e2e-tests.yml'

jobs:
  run_playwright_tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.48.1-noble
    services:
      nu-html-checker:
        image: ghcr.io/validator/validator:latest
        ports:
          - 8888:8888
    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 #v4
      name: Install pnpm
      with:
        run_install: false
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: 'pnpm'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@navikt'
    - name: Install dependencies
      env:
        NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      run: |
        pnpm config set @navikt:registry https://npm.pkg.github.com
        pnpm config set //npm.pkg.github.com/:_authToken $NPM_AUTH_TOKEN
        pnpm install --prefer-offline --ignore-scripts --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Run Playwright tests
      env:
        HTML_VALIDATOR_URL: "http://nu-html-checker:8888/?out=json"
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_ALERTS_ENABLED: true
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        NAIS_JOBS_URL: "https://console.nav.cloud.nais.io/team/arbeidsplassen/jobs"
      run: pnpm exec playwright test prod-checklinks
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
